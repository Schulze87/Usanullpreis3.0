name: Build Plugin

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug – Struktur prüfen
        run: |
          echo "=== Inhalt von UsaNullpreis/ ==="
          ls -la ./UsaNullpreis/
          echo "=== Inhalt von UsaNullpreis/src/ ==="
          find ./UsaNullpreis/src -type f
          echo "=== composer.json ==="
          cat ./UsaNullpreis/composer.json
          echo "=== Hauptklasse ==="
          cat ./UsaNullpreis/src/UsaNullpreis.php
          echo "=== services.xml ==="
          cat ./UsaNullpreis/src/Resources/config/services.xml
          echo "=== config.xml ==="
          cat ./UsaNullpreis/src/Resources/config/config.xml 2>/dev/null || echo "config.xml nicht vorhanden"
          echo "=== Admin JS ==="
          find ./UsaNullpreis/src/Resources/app -type f 2>/dev/null || echo "Keine Admin-Assets gefunden"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install shopware-cli
        uses: shopware/shopware-cli-action@v1
        with:
          version: 0.12.0

      - name: Build Extension
        run: shopware-cli extension zip ./UsaNullpreis --disable-git --verbose

      - name: Upload ZIP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UsaNullpreis
          path: "*.zip"
